apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: medical-ocr
  labels:
    app: postgres
spec:
  # Headless service for StatefulSet — DNS resolves to pod IPs directly
  type: ClusterIP
  clusterIP: None
  selector:
    app: postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
      protocol: TCP
