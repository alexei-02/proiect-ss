apiVersion: v1
kind: Service
metadata:
  name: mosquitto
  namespace: medical-ocr
  labels:
    app: mosquitto
  annotations:
    # Preserve client source IPs so mTLS certificate CN can be validated
    service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
spec:
  type: LoadBalancer
  selector:
    app: mosquitto
  ports:
    - name: mqtts
      port: 8883
      targetPort: 8883
      protocol: TCP
  # Preserve client IP for mTLS CN validation
  externalTrafficPolicy: Local
