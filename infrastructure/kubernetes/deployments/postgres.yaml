apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: medical-ocr
  labels:
    app: postgres
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      securityContext:
        runAsUser: 999
        runAsGroup: 999
        fsGroup: 999
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
              name: postgres
          env:
            - name: POSTGRES_USER
              value: medical
            - name: POSTGRES_DB
              value: medical_ocr
            - name: POSTGRES_PASSWORD_FILE
              value: /run/secrets/db-password
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - "pg_isready -U medical -d medical_ocr"
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - "pg_isready -U medical -d medical_ocr"
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
            - name: db-password
              mountPath: /run/secrets/db-password
              subPath: db-password
              readOnly: true
      volumes:
        - name: db-password
          secret:
            secretName: db-credentials
            items:
              - key: db-password
                path: db-password
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi
