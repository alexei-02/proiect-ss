apiVersion: apps/v1
kind: Deployment
metadata:
  name: mosquitto
  namespace: medical-ocr
  labels:
    app: mosquitto
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mosquitto
  template:
    metadata:
      labels:
        app: mosquitto
    spec:
      containers:
        - name: mosquitto
          image: eclipse-mosquitto:2.0
          ports:
            - containerPort: 8883
              name: mqtts
          resources:
            requests:
              cpu: "100m"
              memory: "64Mi"
            limits:
              cpu: "500m"
              memory: "128Mi"
          volumeMounts:
            - name: mosquitto-config
              mountPath: /mosquitto/config/mosquitto.conf
              subPath: mosquitto.conf
              readOnly: true
            - name: mosquitto-acl
              mountPath: /mosquitto/config/acl.conf
              subPath: acl.conf
              readOnly: true
            - name: mosquitto-tls
              mountPath: /mosquitto/certs
              readOnly: true
            - name: mosquitto-data
              mountPath: /mosquitto/data
      volumes:
        - name: mosquitto-config
          configMap:
            name: mosquitto-config
        - name: mosquitto-acl
          configMap:
            name: mosquitto-acl
        - name: mosquitto-tls
          secret:
            secretName: mosquitto-tls
        - name: mosquitto-data
          emptyDir: {}
