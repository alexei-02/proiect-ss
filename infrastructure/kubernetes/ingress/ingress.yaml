apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: medical-ocr-ingress
  namespace: medical-ocr
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
    # Restrict Prometheus metrics endpoint to internal networks only
    nginx.ingress.kubernetes.io/whitelist-source-range: "10.0.0.0/8"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  tls:
    - hosts:
        - medical-ocr.example.com
      secretName: medical-ocr-tls
  rules:
    - host: medical-ocr.example.com
      http:
        paths:
          - path: /api/
            pathType: Prefix
            backend:
              service:
                name: api
                port:
                  number: 8989
          - path: /metrics/prometheus
            pathType: Exact
            backend:
              service:
                name: api
                port:
                  number: 8989
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 3000
