apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-api-ingress
  namespace: medical-ocr
spec:
  podSelector:
    matchLabels:
      app: api
  policyTypes:
    - Ingress
  ingress:
    # Allow from frontend pod in same namespace
    - from:
        - podSelector:
            matchLabels:
              app: frontend
      ports:
        - port: 8989
          protocol: TCP
    # Allow from nginx ingress controller (separate namespace)
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - port: 8989
          protocol: TCP
