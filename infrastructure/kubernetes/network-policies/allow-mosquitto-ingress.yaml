apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-mosquitto-ingress
  namespace: medical-ocr
spec:
  podSelector:
    matchLabels:
      app: mosquitto
  policyTypes:
    - Ingress
  ingress:
    # Allow from API pod (internal MQTT consumer)
    - from:
        - podSelector:
            matchLabels:
              app: api
      ports:
        - port: 8883
          protocol: TCP
    # Allow from external edge devices (no podSelector = allow from any source incl. external)
    # The LoadBalancer service routes external traffic here; mTLS enforces device identity.
    - ports:
        - port: 8883
          protocol: TCP
