---
# Allow API pod DNS resolution (all pods that need external name resolution)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns-egress
  namespace: medical-ocr
spec:
  podSelector:
    matchExpressions:
      - key: app
        operator: In
        values: [api, frontend]
  policyTypes:
    - Egress
  egress:
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP

---
# Allow API pod egress to Postgres and Mosquitto
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-api-egress
  namespace: medical-ocr
spec:
  podSelector:
    matchLabels:
      app: api
  policyTypes:
    - Egress
  egress:
    # Postgres
    - to:
        - podSelector:
            matchLabels:
              app: postgres
      ports:
        - port: 5432
          protocol: TCP
    # Mosquitto (mTLS)
    - to:
        - podSelector:
            matchLabels:
              app: mosquitto
      ports:
        - port: 8883
          protocol: TCP
    # DNS (already covered by allow-dns-egress but explicit here for clarity)
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
