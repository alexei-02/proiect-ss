######################################################################
# MQTT Topic ACL
#
# Format:
#   user <username>            (matches the cert CN)
#   topic [read|write|readwrite|deny] <topic-pattern>
#
# Patterns:
#   %u  — replaced with the username (CN)
#   %c  — replaced with the client ID
#   +   — single-level wildcard (only allowed where explicitly granted)
#   #   — multi-level wildcard (admin only)
#
# Deny-by-default: any topic not explicitly granted is denied.
######################################################################

# ── Edge devices ────────────────────────────────────────────────────
# Each device's CN is "device_<id>" (e.g. device_esp32_001).
# Pattern rules use %u so we don't need a per-device entry.

pattern write medical/images/%u/upload
pattern write medical/devices/%u/status
pattern read  medical/firmware/%u/ota

# ── API server ──────────────────────────────────────────────────────
# Reads inbound images from any device, publishes alerts.
# Cannot publish images (only devices and admins can).

user api_server
topic read  medical/images/+/upload
topic read  medical/devices/+/status
topic read  medical/ocr/+/results
topic write medical/alerts/+
topic write medical/notifications/+

# ── OCR worker ──────────────────────────────────────────────────────
# Subscribes to a dedicated processing queue topic.
# Publishes structured results back.
# Has NO access to device topics or alerts.

user ocr_service
topic read  medical/ocr/queue/+
topic write medical/ocr/+/results

# ── Admin / monitoring service ──────────────────────────────────────
# Full access — used for diagnostics, OTA pushes, system topics.
# Restrict to a single, tightly-controlled cert.

user admin_service
topic readwrite #
topic read $SYS/#

# ── Audit log subscriber ────────────────────────────────────────────
# Read-only firehose for the immutable audit archive.

user audit_service
topic read medical/+/+/+
topic read $SYS/broker/log/+
