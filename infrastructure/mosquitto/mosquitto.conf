######################################################################
# Mosquitto MQTT broker — production-leaning config
#
# Provides:
#   - mTLS authentication (cert CN -> ACL username)
#   - Per-client/global connection limits
#   - Payload size cap (DoS defense)
#   - Persistence on a bounded volume
#   - Stdout logging for container log drivers
######################################################################

# ── Listeners ────────────────────────────────────────────────────────
# Plain TCP listener is intentionally NOT enabled.
# All traffic goes through the TLS listener on 8883.

listener 8883
protocol mqtt

# ── TLS / mTLS ───────────────────────────────────────────────────────
cafile      /mosquitto/certs/ca.crt
certfile    /mosquitto/certs/server.crt
keyfile     /mosquitto/certs/server.key

# Require clients to present a valid certificate signed by our CA.
require_certificate true

# Use the certificate's CN field as the username for ACL checks.
# This means a device cannot impersonate another device — the CN is
# bound to the cert and we validate the cert against our CA.
use_identity_as_username true

# Modern TLS only.
tls_version tlsv1.3

# ── Authentication ───────────────────────────────────────────────────
# No anonymous connections. No password file (mTLS is the only auth).
allow_anonymous false
acl_file /mosquitto/config/acl.conf

# ── DoS / abuse protections ──────────────────────────────────────────
# Max payload per message (10 MB — medical scans rarely exceed 8 MB).
message_size_limit 10485760

# Per-client message inflight cap.
max_inflight_messages 20

# Per-client offline queue cap.
max_queued_messages 100

# Global connection cap (tune for your deployment scale).
max_connections 500

# Per-listener connection rate limit (handled at the network edge,
# but we also keep_alive aggressively to drop dead clients fast).
max_keepalive 60

# ── Persistence ──────────────────────────────────────────────────────
persistence true
persistence_location /mosquitto/data/

# Limit retained messages to prevent disk fill via malicious retain.
retain_available true

# ── Logging ──────────────────────────────────────────────────────────
log_dest stdout
log_type error
log_type warning
log_type notice
log_type information
log_timestamp true
connection_messages true

# Log every authentication failure — feeds the SIEM/audit pipeline.
log_type subscribe
log_type unsubscribe
