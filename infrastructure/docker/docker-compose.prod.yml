######################################################################
# Production docker-compose.
#
# Requires a .env.prod file in the repo root (gitignored) with:
#
#   DB_PASSWORD=<openssl rand -hex 32>
#   JWT_SECRET=<openssl rand -hex 48>
#   PHI_MASTER_KEY=<openssl rand -hex 32>
#   INITIAL_ADMIN_USERNAME=admin
#   INITIAL_ADMIN_PASSWORD=<strong password>
#
# Certs that must exist on the VM before first deploy:
#   /opt/medical-ocr/certs/origin.crt   Cloudflare Origin Certificate
#   /opt/medical-ocr/certs/origin.key   private key (chmod 600)
#   /opt/medical-ocr/mqtt-certs/        mTLS certs for broker + API client
#     ca.crt  api_server.crt  api_server.key  broker.crt  broker.key
#
# Usage (run from repo root):
#   docker compose -f infrastructure/docker/docker-compose.prod.yml \
#     --env-file .env.prod up --build -d
######################################################################

services:

  # ── Reverse proxy (HTTPS termination via Cloudflare Origin Cert) ───
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /opt/medical-ocr/certs:/etc/nginx/certs:ro
    depends_on:
      - api
    networks:
      - edge
      - api-internal

  # ── REST API + MQTT consumer + result poller ───────────────────────
  api:
    build:
      context: ../../services/api
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      ENV: production
      DATABASE_URL: postgresql://medical:${DB_PASSWORD}@postgres:5432/medical_ocr
      JWT_SECRET: ${JWT_SECRET}
      JWT_ALGORITHM: "HS256"
      JWT_AUDIENCE: "medical-ocr-api"
      JWT_ISSUER: "medical-ocr-api"
      JWT_ACCESS_TTL_SECONDS: "900"
      JWT_REFRESH_TTL_SECONDS: "604800"
      PHI_MASTER_KEY: ${PHI_MASTER_KEY}
      DEV_AUTH_BYPASS: "false"
      MQTT_HOST: mosquitto
      MQTT_PORT: "8883"
      MQTT_TLS_CA: /certs/ca.crt
      MQTT_TLS_CERT: /certs/api_server.crt
      MQTT_TLS_KEY: /certs/api_server.key
      MQTT_CLIENT_ID: api_server
      OCR_QUEUE_DIR: /queue
      INITIAL_ADMIN_USERNAME: ${INITIAL_ADMIN_USERNAME}
      INITIAL_ADMIN_PASSWORD: ${INITIAL_ADMIN_PASSWORD}
    volumes:
      - ocr_queue:/queue
      - /opt/medical-ocr/mqtt-certs:/certs:ro
    depends_on:
      postgres:
        condition: service_healthy
      mosquitto:
        condition: service_started
    networks:
      - api-internal
      - mqtt-internal
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: "512M"

  # ── OCR worker (sandboxed — no network egress, read-only FS) ───────
  ocr:
    build:
      context: ../../services/ocr
      dockerfile: Dockerfile.ocr
    restart: unless-stopped
    environment:
      OCR_QUEUE_DIR: /queue
      MOCK_OCR: "0"
      EASYOCR_MODULE_PATH: /models
    volumes:
      - ocr_queue:/queue
      - easyocr_models:/models
    read_only: true
    tmpfs:
      - /tmp:size=100m,noexec,nosuid
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    networks:
      - ocr-isolated
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: "2G"

  # ── Frontend (Next.js) ─────────────────────────────────────────────
  frontend:
    build:
      context: ../../services/frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      API_BASE_URL: "http://api:8989"
    depends_on:
      - api
    networks:
      - edge
      - api-internal
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: "256M"

  # ── Database (internal only, never exposed to host) ────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: medical
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: medical_ocr
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - api-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medical -d medical_ocr"]
      interval: 10s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: "1G"

  # ── MQTT broker (mTLS, devices connect on 8883) ────────────────────
  mosquitto:
    image: eclipse-mosquitto:2.0
    restart: unless-stopped
    ports:
      - "8883:8883"
    volumes:
      - ../mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - ../mosquitto/acl.conf:/mosquitto/config/acl.conf:ro
      - /opt/medical-ocr/mqtt-certs:/mosquitto/certs:ro
      - mosquitto_data:/mosquitto/data
    networks:
      - edge
      - mqtt-internal
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: "128M"

volumes:
  postgres_data:
  ocr_queue:
  mosquitto_data:
  easyocr_models:

networks:
  edge:
    # Internet-facing: nginx binds 80/443, mosquitto binds 8883.
  mqtt-internal:
    internal: true   # Mosquitto <-> API only
  api-internal:
    internal: true   # API <-> Postgres, nginx/frontend <-> API
  ocr-isolated:
    internal: true   # OCR worker — no route to anything
